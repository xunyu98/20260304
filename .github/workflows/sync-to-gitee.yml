name: 🔄 Auto Sync to Gitee (SSH)

on:
  push:
    branches: [main, master, develop]
  schedule:
    - cron: '0 2,8,14,20 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 🔑 Setup SSH for Gitee (Final Fix)
        env:
          SSH_KEY: ${{ secrets.GITEE_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          
          # 🔥 关键修复：使用 printf 精确写入，禁止解析转义字符
          printf "%s" "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          
          ssh-keyscan -H gitee.com >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          
          # 强制修复密钥权限（针对 Runner 特殊环境）
          sudo chown -R $USER:$USER ~/.ssh
          
          echo "🔌 Testing Gitee SSH connection..."
          # 严格检查连接，失败立即退出
          if ! ssh -T git@gitee.com; then
            echo "❌ SSH connection failed! Please check GITEE_SSH_PRIVATE_KEY secret."
            exit 1
          fi

      - name: 🚀 Push to Gitee
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@users.noreply.github.com"
          
          git remote remove gitee 2>/dev/null || true
          git remote add gitee git@gitee.com:xunyu98/20260304.git
          
          git fetch gitee
          
          for BRANCH in main master develop; do
            if git rev-parse --verify "$BRANCH" >/dev/null 2>&1; then
              echo "Pushing $BRANCH..."
              git push -f gitee "$BRANCH"
            fi
          done
          
          git push gitee --tags

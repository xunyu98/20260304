name: 🔄 Auto Sync to Gitee (SSH)

on:
  push:
    branches: [main, master, develop]  # 根据你的分支名调整！
  schedule:
    - cron: '0 2,8,14,20 * * *'  # UTC+8 时区参考：国内建议用此时间点

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉取完整历史（含所有分支/标签）

      - name: 🔑 Setup SSH for Gitee
        env:
          SSH_KEY: ${{ secrets.GITEE_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf "%s" "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan gitee.com >> ~/.ssh/known_hosts
          # 调试：验证 SSH 连通性（首次运行保留，成功后可删）
          ssh -T git@gitee.com 2>&1 | grep -E "(Hi|成功|Success)"

      - name: 🚀 Push to Gitee
        run: |
          git remote add gitee git@gitee.com:你的Gitee用户名/仓库名.git 2>/dev/null || true
          git push --force --prune gitee "refs/remotes/origin/*:refs/heads/*" "refs/tags/*:refs/tags/*"

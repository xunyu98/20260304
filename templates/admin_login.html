<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>测试平台 - 用户管理平台</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <div class="login-box">
            <div class="logo">
                <div class="logo-icon">👥</div>
                <h1>用户管理平台</h1>
                <!-- <p class="subtitle">管理员专属入口</p> -->
            </div>

            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="username">管理员账号</label>
                    <input type="text" id="username" name="username" placeholder="请输入管理员账号" required autocomplete="username">
                    <span class="error-message" id="usernameError"></span>
                </div>

                <div class="form-group">
                    <label for="password">管理员密码</label>
                    <input type="password" id="password" name="password" placeholder="请输入密码" required autocomplete="current-password">
                    <span class="error-message" id="passwordError"></span>
                </div>

                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="rememberMe">
                        <span>记住我</span>
                    </label>
                    <a href="#" class="forgot-password">忘记密码？联系系统管理员</a>
                </div>

                <button type="submit" class="btn-submit" id="loginBtn">
                    <span class="btn-text">登 录</span>
                    <span class="loading-spinner" style="display: none;"></span>
                </button>

                <div class="form-footer">
                    <p>返回 <a href="/login.html" class="link">平台登录页</a></p>
                </div>
            </form>

            <div id="messageBox" class="message-box" style="display: none;">
                <span class="message-icon"></span>
                <span class="message-text"></span>
            </div>
        </div>

        <div class="background-shapes">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
        </div>
    </div>

    <script src="/static/js/admin_login.js"></script>
</body>
</html>
